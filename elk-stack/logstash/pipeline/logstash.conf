input {
  tcp {
    port => 5000
    codec => json
  }
  file {
    path => "/var/log/app.log"
    start_position => "beginning"
  }
}

# filter {
#   # Example: parse timestamp
#   date {
#     match => ["timestamp", "ISO8601"]
#   }
# }

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "app-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}