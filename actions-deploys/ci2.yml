name: CI

on:
  push:
    branches: [ main, develop, feat/workflow ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
        
      - name: Run format check
        run: npm run format

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test
      
      - name: Build project
        run: npm run build

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        if: secrets.DOCKER_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        if: secrets.DOCKER_USERNAME != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sample-live-chat-app:latest
            ${{ secrets.DOCKER_USERNAME }}/sample-live-chat-app:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sample-live-chat-app:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sample-live-chat-app:buildcache,mode=max
      
      - name: Build Docker image (local)
        if: secrets.DOCKER_USERNAME == ''
        run: docker build -t my-chat-app:latest -t my-chat-app:${{ github.sha }} .